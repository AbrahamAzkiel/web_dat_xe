<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả tìm vé</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="index.html">🚍 XeNhanh</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        ☰
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li><a class="nav-link" href="index.html#about">About</a></li>
          <li><a class="nav-link" href="index.html#services">Services</a></li>
          <li><a class="nav-link" href="index.html#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="container section" style="padding-top: 130px;">
    <div class="results-summary">
      <h2>Kết quả tìm vé</h2>
      <p id="searchSummary">Đang tìm chuyến phù hợp...</p>
    </div>

    <div id="results"></div>

    <div class="text-center mt-4">
      <a href="index.html" class="btn btn-outline-warning">Tìm lại</a>
    </div>
  </section>

  <div class="modal fade" id="seatModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content p-3">
        <div class="modal-header">
          <h5 class="modal-title" id="seatModalTitle">Chọn chỗ ngồi</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
        </div>
        <div class="modal-body">
          <p id="seatModalSubtitle">Chọn một ghế trống để đặt vé.</p>
          <div class="seat-grid" id="seatGrid"></div>
          <div class="mt-3 d-flex justify-content-between align-items-center">
            <div class="seat-legend">
              <span class="badge bg-success">Trống</span>
              <span class="badge bg-secondary">Đã đặt</span>
              <span class="badge bg-warning text-dark">Chọn</span>
            </div>
            <button id="confirmSeatBtn" class="btn btn-primary" disabled>Đặt ghế</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center p-3">
    © 2024 XeNhanh
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/results.js"></script>
</body>
</html>
